<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>RegHunt EDR - Horizontal Attack Chain Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0a0e1a;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, monospace;
      margin: 0;
      padding: 20px;
      color: #eef2ff;
    }

    .app-container {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Header & stats */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stats-badge {
      background: #111827;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-family: monospace;
      border: 1px solid #2d3a5e;
    }

    /* entry selector */
    .selector-panel {
      background: #0f172a;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 28px;
      border: 1px solid #1e2a44;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .selector-label {
      font-weight: 500;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    select {
      background: #020617;
      border: 1px solid #334155;
      padding: 10px 24px 10px 14px;
      border-radius: 40px;
      color: #f1f5f9;
      font-family: monospace;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      min-width: 320px;
    }

    .badge-critical {
      background: #7f1a1a;
      color: #fecaca;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 8px;
    }

    .badge-high {
      background: #b45309;
      color: #ffedd5;
    }

    .refresh-btn {
      background: #1e293b;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .refresh-btn:hover {
      background: #2d3a5e;
    }

    /* Horizontal chain container */
    .chain-container {
      background: #0b1120;
      border-radius: 28px;
      border: 1px solid #1f2a44;
      padding: 24px 16px;
      overflow-x: auto;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }

    .chain-track {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      min-width: max-content;
      padding: 12px 8px;
    }

    /* process card */
    .proc-card {
      background: #111827;
      border-radius: 20px;
      width: 260px;
      flex-shrink: 0;
      border-left: 4px solid;
      transition: all 0.2s;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }

    .proc-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.4);
      background: #1a2332;
    }

    .card-header {
      padding: 12px 14px 8px 14px;
      border-bottom: 1px solid #1f2a44;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .proc-name {
      font-weight: 700;
      font-size: 1.05rem;
      font-family: 'JetBrains Mono', monospace;
      word-break: break-word;
    }

    .pid {
      font-size: 0.7rem;
      background: #0f172a;
      padding: 2px 8px;
      border-radius: 30px;
      font-family: monospace;
      color: #94a3b8;
    }

    .source-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #1e293b;
      color: #b9c7db;
    }

    .source-sysmon {
      background: #0f3b2c;
      color: #86efac;
    }

    .source-4688 {
      background: #2c2a4a;
      color: #c7d2fe;
    }

    .source-inferred {
      background: #3b2e1e;
      color: #fde047;
    }

    .card-body {
      padding: 10px 14px 14px 14px;
    }

    .user-info {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-bottom: 10px;
      font-family: monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mitre-badge {
      display: inline-block;
      background: #1e2a3a;
      padding: 3px 8px;
      border-radius: 30px;
      font-size: 0.65rem;
      font-family: monospace;
      font-weight: 500;
      margin-right: 6px;
      margin-bottom: 6px;
      color: #a5f3fc;
    }

    .cmdline {
      font-size: 0.7rem;
      font-family: monospace;
      background: #010409;
      padding: 8px;
      border-radius: 12px;
      margin-top: 8px;
      color: #cbd5e6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid #1e2a44;
    }

    .arrow-symbol {
      font-size: 28px;
      color: #4b556b;
      margin: 0 2px;
      flex-shrink: 0;
    }

    .loading {
      text-align: center;
      padding: 48px;
      color: #6c86a3;
    }

    .error {
      background: #3b0f0f;
      border-left: 6px solid #ef4444;
      padding: 14px;
      border-radius: 16px;
      margin: 20px 0;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: #475569;
    }

    /* type colors */
    .type-malicious {
      border-left-color: #ef4444;
    }

    .type-suspicious {
      border-left-color: #f97316;
    }

    .type-normal {
      border-left-color: #22c55e;
    }

    .type-system {
      border-left-color: #6b7280;
    }

    .type-unknown {
      border-left-color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="header">
      <h1>🔍 RegHunt · EDR Attack Chain</h1>
      <div class="stats-badge" id="statsInfo">⏳ Loading stats...</div>
    </div>

    <div class="selector-panel">
      <span class="selector-label">🎯 PERSISTENCE ENTRY (CRITICAL / HIGH)</span>
      <select id="entrySelect" style="flex:1; max-width: 500px;">
        <option value="">— Select a registry entry to visualize chain —</option>
      </select>
      <button class="refresh-btn" id="refreshBtn">⟳ Refresh list & chains</button>
    </div>

    <div class="chain-container" id="chainContainer">
      <div class="loading" id="loadingMsg">✨ Select an entry to render EDR-style horizontal chain</div>
    </div>
    <div class="footer">
      🧬 Process ancestry: left (oldest) → right (writer). SYSMON exact = green badge, inferred = yellow.
      MITRE TTPs shown per node.
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';  // FastAPI default
    let currentEntries = [];

    async function fetchStats() {
      try {
        const resp = await fetch(`${API_BASE}/api/stats`);
        if (!resp.ok) throw new Error('Stats failed');
        const stats = await resp.json();
        document.getElementById('statsInfo').innerHTML = `📊 ${stats.total} entries | 🔴 ${stats.critical} critical | 🟠 ${stats.high} high | 🧬 Sysmon: ${stats.sysmon_events}`;
      } catch (e) {
        document.getElementById('statsInfo').innerHTML = '⚠️ Cannot connect to API. Is backend running?';
        console.error(e);
      }
    }

    async function fetchCriticalHighEntries() {
      try {
        // we use /api/entries with severity filter
        const url = `${API_BASE}/api/entries?severity=critical&limit=50`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('entries fetch failed');
        const data = await resp.json();
        let criticalEntries = data.entries || [];

        // also fetch high severity
        const respHigh = await fetch(`${API_BASE}/api/entries?severity=high&limit=50`);
        const highData = await respHigh.json();
        let highEntries = highData.entries || [];

        let all = [...criticalEntries, ...highEntries];
        // remove duplicates by id
        const unique = new Map();
        for (const e of all) unique.set(e.id, e);
        currentEntries = Array.from(unique.values());
        currentEntries.sort((a, b) => {
          if (a.severity === 'critical' && b.severity !== 'critical') return -1;
          if (a.severity !== 'critical' && b.severity === 'critical') return 1;
          return (b.last_seen || '').localeCompare(a.last_seen || '');
        });
        populateSelect(currentEntries);
        return currentEntries;
      } catch (e) {
        console.error(e);
        document.getElementById('chainContainer').innerHTML = `<div class="error">❌ Failed to fetch entries: ${e.message}. Make sure API is running on port 8000.</div>`;
        return [];
      }
    }

    function populateSelect(entries) {
      const select = document.getElementById('entrySelect');
      select.innerHTML = '<option value="">— Select a registry entry to visualize chain —</option>';
      for (const entry of entries) {
        const option = document.createElement('option');
        option.value = entry.id;
        const severityTag = entry.severity === 'critical' ? '🔴 CRITICAL' : '🟠 HIGH';
        option.textContent = `[${severityTag}] ${entry.name} (${entry.hive})`;
        select.appendChild(option);
      }
    }

    async function fetchAndRenderChain(entryId) {
      const container = document.getElementById('chainContainer');
      container.innerHTML = '<div class="loading">⏳ Building attack chain from Sysmon/4688 logs...</div>';

      try {
        const resp = await fetch(`${API_BASE}/api/entries/${entryId}/chain`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const chainData = await resp.json();
        const chain = chainData.chain || [];
        renderHorizontalChain(chain, chainData.entry_name);
      } catch (err) {
        container.innerHTML = `<div class="error">⚠️ Chain fetch error: ${err.message}<br>Make sure backend has chain data and Sysmon events.</div>`;
      }
    }

    function renderHorizontalChain(chain, entryName) {
      const container = document.getElementById('chainContainer');
      if (!chain || chain.length === 0) {
        container.innerHTML = `<div class="error">❗ No process chain available for this entry (no matching Sysmon/4688 events). Try refreshing Sysmon collection or check older entries.</div>`;
        return;
      }

      // Build horizontal flex track
      const track = document.createElement('div');
      track.className = 'chain-track';

      for (let i = 0; i < chain.length; i++) {
        const node = chain[i];
        const card = createNodeCard(node);
        track.appendChild(card);

        // add arrow if not last
        if (i < chain.length - 1) {
          const arrowSpan = document.createElement('div');
          arrowSpan.className = 'arrow-symbol';
          arrowSpan.innerHTML = '→';
          track.appendChild(arrowSpan);
        }
      }

      // Add small header with entry context
      const headerDiv = document.createElement('div');
      headerDiv.style.marginBottom = '16px';
      headerDiv.style.fontSize = '0.8rem';
      headerDiv.style.color = '#b9c7db';
      headerDiv.innerHTML = `<span style="background:#0f172a; padding:4px 12px; border-radius:40px;">🎯 Target persistence: <strong>${escapeHtml(entryName)}</strong></span>`;

      container.innerHTML = '';
      container.appendChild(headerDiv);
      container.appendChild(track);
    }

    function createNodeCard(node) {
      const card = document.createElement('div');
      card.className = `proc-card type-${node.type || 'unknown'}`;

      // header: name + pid + source badge
      const header = document.createElement('div');
      header.className = 'card-header';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'proc-name';
      nameSpan.textContent = node.name || 'unknown.exe';

      const pidSpan = document.createElement('span');
      pidSpan.className = 'pid';
      pidSpan.textContent = node.pid ? `PID ${node.pid}` : 'PID ?';

      let sourceClass = 'source-badge';
      let sourceText = node.source || 'inferred';
      if (sourceText.includes('sysmon')) sourceClass += ' source-sysmon';
      else if (sourceText.includes('4688')) sourceClass += ' source-4688';
      else sourceClass += ' source-inferred';

      const sourceBadge = document.createElement('span');
      sourceBadge.className = sourceClass;
      sourceBadge.textContent = sourceText.toUpperCase();

      header.appendChild(nameSpan);
      header.appendChild(pidSpan);
      header.appendChild(sourceBadge);

      // body: user, mitre techniques, optional command line
      const body = document.createElement('div');
      body.className = 'card-body';

      if (node.user && node.user !== 'unknown') {
        const userDiv = document.createElement('div');
        userDiv.className = 'user-info';
        userDiv.innerHTML = `👤 ${escapeHtml(node.user)}`;
        body.appendChild(userDiv);
      }

      // MITRE techniques
      if (node.techniques && node.techniques.length) {
        const techDiv = document.createElement('div');
        techDiv.style.marginTop = '4px';
        techDiv.style.marginBottom = '6px';
        for (const t of node.techniques) {
          const badge = document.createElement('span');
          badge.className = 'mitre-badge';
          badge.textContent = t.id || (typeof t === 'string' ? t : t.id);
          if (t.name) badge.title = t.name;
          techDiv.appendChild(badge);
        }
        body.appendChild(techDiv);
      }

      // Command line (if exists and not empty)
      if (node.cmdline && node.cmdline.trim().length > 0) {
        const cmdDiv = document.createElement('div');
        cmdDiv.className = 'cmdline';
        let cmdShort = node.cmdline.length > 100 ? node.cmdline.substring(0, 97) + '...' : node.cmdline;
        cmdDiv.textContent = cmdShort;
        cmdDiv.title = node.cmdline;  // full on hover
        body.appendChild(cmdDiv);
      } else if (node.type === 'unknown' && node.unknown_reason) {
        const unknownNote = document.createElement('div');
        unknownNote.className = 'cmdline';
        unknownNote.style.background = '#2d1a1a';
        unknownNote.textContent = `⚠️ ${node.unknown_reason}`;
        body.appendChild(unknownNote);
      }

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function (m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Event handlers
    document.getElementById('entrySelect').addEventListener('change', (e) => {
      const entryId = e.target.value;
      if (entryId) {
        fetchAndRenderChain(entryId);
      } else {
        document.getElementById('chainContainer').innerHTML = '<div class="loading">✨ Select an entry to view EDR horizontal chain</div>';
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      await fetchCriticalHighEntries();
      await fetchStats();
      const select = document.getElementById('entrySelect');
      if (select.value) {
        fetchAndRenderChain(select.value);
      }
    });

    // initial load
    (async () => {
      await fetchStats();
      await fetchCriticalHighEntries();
      // optionally pre-select first entry
      const select = document.getElementById('entrySelect');
      if (select.options.length > 1) {
        select.selectedIndex = 1;  // first real entry
        const firstId = select.value;
        if (firstId) fetchAndRenderChain(firstId);
      }
    })();
  </script>
</body>

</html>
